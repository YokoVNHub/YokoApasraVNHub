    <div class="container header-container">

        <a

        <nav>

            <ul class="nav-menu">

                <li>
                    <a href="../index.html">
                        Home

                </li>

                <li>
                    <a href="../events/">
                        Events
                    </a>
                </li>

                <li>
                    <a
                        href="./"

                        Exclusive

                    </a>
                </li>

                <li>
                    <a href="../about/">
                        About
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</header>


<main class="gallery-page exclusive-detail-page">

    <div class="container">

        <!-- Back -->

        <a
            href="index.html"
            class="back-link">

            ← Back to Exclusive

        </a>


        <!-- Poster -->

        <section class="exclusive-poster">

            <img
                id="poster-image"
                src=""
                alt="Poster">

        </section>


        <!-- Info -->

        <section class="exclusive-info">

            <span class="exclusive-badge">

                ✦ Exclusive Collection

            </span>

            <h1
                id="event-title">

            </h1>

            <h2
                id="event-subtitle">

            </h2>

            <div
                id="event-meta"
                class="gallery-meta">

            </div>


            <a
                id="download-album"
                href=""
                class="download-album"
                download>

                Download Full Album

            </a>

        </section>


        <!-- Gallery -->

        <section class="exclusive-gallery">

            <div class="gallery-heading">

                <h2>

                    Gallery

                </h2>

            </div>

            <div
                id="gallery"
                class="gallery">

            </div>

        </section>

    </div>

</main>


<!-- ==========================================
     LIGHTBOX
========================================== -->

<div
    id="lightbox"
    class="lightbox">

    <button
        type="button"
        class="lightbox-close">

        &times;

    </button>


    <div
        id="lightbox-counter"
        class="lightbox-counter">

    </div>


    <button
        type="button"
        class="lightbox-prev">

        &#10094;

    </button>


    <div class="lightbox-stage">

        <img
            id="lightbox-image"
            alt="">

    </div>


    <button
        type="button"
        class="lightbox-next">

        &#10095;

    </button>


    <a
        id="lightbox-download"
        class="lightbox-download"
        href=""
        download>

        Download Original

        <i class="bubble"></i>
        <i class="bubble"></i>
        <i class="bubble"></i>

    </a>


    <p
        id="lightbox-caption"
        class="lightbox-caption">

    </p>

</div>
