<main>

    <!-- HERO -->

    <section class="events-hero">

        <div class="container hero-layout">

            <div class="hero-copy">

                <span class="hero-kicker">
                    🤍 YOKO APASRA
                </span>

                <h1 class="hero-title">

                    Events
                    <span>Archive</span>

                </h1>

                <p class="hero-desc">

                    Preserving Yoko's beautiful moments
                    through every event and appearance.

                </p>

                <div class="hero-stats">

                    <div class="hero-stat">

                        <strong id="total-events">
                            0
                        </strong>

                        <span>
                            Events Archived
                        </span>

                    </div>

                    <div class="hero-stat">

                        <strong id="total-photos">
                            0
                        </strong>

                        <span>
                            Photos Preserved
                        </span>

                    </div>

                </div>

            </div>

            <div class="hero-image">

                <img
                    src="../assets/images/events.png"
                    alt="Yoko">

            </div>

        </div>

    </section>


    <!-- LATEST -->

    <section class="latest-event">

        <div class="container">

            <div id="latest-event-card"></div>

        </div>

    </section>


    <!-- EVENTS -->

    <section class="events-page">

        <div class="container">

            <div class="events-heading">

                <h2>

                    Browse All Events 🤍

                </h2>

            </div>


            <div class="events-toolbar">

                <div
                    id="month-filter"
                    class="events-filter">

                </div>


                <div class="events-actions">

                    <div class="events-sort">

                        <select id="sort-select">

                            <option value="newest">
                                Newest First
                            </option>

                            <option value="oldest">
                                Oldest First
                            </option>

                        </select>

                    </div>

                    <div class="view-toggle">

                        <button
                            id="grid-view"
                            class="view-btn active">

                            ⊞

                        </button>

                        <button
                            id="list-view"
                            class="view-btn">

                            ☰

                        </button>

                    </div>

                </div>

            </div>


            <div
                id="events-list"
                class="events-grid">

            </div>

        </div>

    </section>


    <!-- FOOTER -->

    <section class="events-footer">

        <div class="container">

            <div class="footer-message">

                <h2>

                    WITH YO,<br>
                    THROUGH EVERY CHAPTER

                </h2>

                <p>

                    For people who love
                    Yoko Apasra 🤍🫧

                </p>

                <div class="footer-divider"></div>

                <small>

                    Unofficial fan-made archive.<br>
                    Non-commercial project.

                </small>

            </div>

        </div>

    </section>

</main>

<script src="../js/events.js"></script>
